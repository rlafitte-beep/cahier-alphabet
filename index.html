<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Mon Cahier des Lettres 🔤</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;800&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --coral:#F0997B;--pink:#D4537E;--pink-dark:#993556;
  --green:#1D9E75;--green-light:#E1F5EE;--green-dark:#0F6E56;
  --amber:#EF9F27;--amber-light:#FAEEDA;--amber-dark:#854F0B;
  --blue:#185FA5;--blue-light:#E6F1FB;--blue-dark:#0C447C;
  --purple:#534AB7;--purple-light:#EEEDFE;--purple-dark:#3C3489;
  --red-light:#FAECE7;--red-dark:#993C1D;
  --bg:#FFF8F5;--card:#FFFFFF;--text:#2C2020;--muted:#8A7070;
  --border:rgba(44,32,32,0.1);--shadow:0 8px 32px rgba(212,83,126,0.13);
}
html,body{height:100%;overflow:hidden}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);display:flex;flex-direction:column}
.screen{display:none;flex-direction:column;height:100%;overflow:hidden}
.screen.active{display:flex}

/* ===== HOME ===== */
#screen-home{background:linear-gradient(160deg,#FFF0E8 0%,#FFE4EF 50%,#E8F8F2 100%);align-items:center;justify-content:center;padding:24px 20px;position:relative;overflow:hidden}
.home-deco{position:absolute;font-size:70px;opacity:.07;pointer-events:none;animation:float 6s ease-in-out infinite}
.home-deco:nth-child(1){top:4%;left:4%;animation-delay:0s}
.home-deco:nth-child(2){top:8%;right:6%;animation-delay:1.2s}
.home-deco:nth-child(3){bottom:10%;left:6%;animation-delay:2.4s}
.home-deco:nth-child(4){bottom:6%;right:4%;animation-delay:3.6s}
@keyframes float{0%,100%{transform:translateY(0) rotate(-5deg)}50%{transform:translateY(-14px) rotate(5deg)}}
.home-logo{font-family:'Baloo 2',cursive;font-size:clamp(54px,14vw,96px);font-weight:800;background:linear-gradient(135deg,var(--coral),var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1;margin-bottom:4px}
.home-title{font-family:'Baloo 2',cursive;font-size:clamp(20px,6vw,32px);font-weight:800;color:var(--text);text-align:center;margin-bottom:4px}
.home-sub{font-size:clamp(13px,3.5vw,16px);color:var(--muted);text-align:center;margin-bottom:22px}
.progress-card{background:var(--card);border-radius:24px;padding:16px 22px;width:100%;max-width:380px;box-shadow:var(--shadow);margin-bottom:20px}
.progress-label{font-size:12px;font-weight:700;color:var(--muted);margin-bottom:8px;text-align:center;text-transform:uppercase;letter-spacing:1px}
.pbar-wrap{background:#F0E8F0;border-radius:100px;height:14px;overflow:hidden;margin-bottom:10px}
.pbar-fill{height:100%;border-radius:100px;background:linear-gradient(90deg,var(--coral),var(--pink));transition:width .6s cubic-bezier(.34,1.56,.64,1)}
.pbar-stars{text-align:center;font-size:20px;letter-spacing:3px;min-height:28px}
.home-btns{display:flex;flex-direction:column;align-items:center;gap:12px;width:100%;max-width:320px}
.btn-start{background:linear-gradient(135deg,var(--coral),var(--pink));color:white;border:none;border-radius:100px;padding:16px 48px;font-family:'Baloo 2',cursive;font-size:clamp(17px,5vw,22px);font-weight:800;cursor:pointer;box-shadow:0 8px 24px rgba(212,83,126,.35);transition:transform .15s;width:100%}
.btn-start:active{transform:scale(.96)}
.btn-quiz-home{background:linear-gradient(135deg,var(--amber),#D85A30);color:white;border:none;border-radius:100px;padding:14px 36px;font-family:'Baloo 2',cursive;font-size:clamp(14px,4vw,18px);font-weight:800;cursor:pointer;box-shadow:0 6px 18px rgba(186,117,23,.3);transition:transform .15s;width:100%}
.btn-quiz-home:active{transform:scale(.96)}
.btn-reset{background:none;border:2px solid var(--border);border-radius:100px;padding:10px 24px;font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;color:var(--muted);cursor:pointer}

/* ===== TOP BAR ===== */
.top-bar{background:var(--card);padding:12px 16px 10px;display:flex;align-items:center;gap:12px;box-shadow:0 2px 12px rgba(0,0,0,.06);flex-shrink:0;z-index:10}
.btn-back{width:40px;height:40px;border-radius:50%;border:2px solid var(--border);background:var(--bg);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.btn-back:active{background:#F0E0E8}
.top-bar-title{font-family:'Baloo 2',cursive;font-size:20px;font-weight:800;color:var(--text);flex:1}
.top-bar-badge{font-size:13px;font-weight:700;color:var(--pink);background:#FFE8F2;padding:4px 12px;border-radius:100px;flex-shrink:0}

/* ===== GRID ===== */
.grid-scroll{flex:1;overflow-y:auto;padding:16px;-webkit-overflow-scrolling:touch}
.alphabet-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(70px,1fr));gap:10px;max-width:600px;margin:0 auto 16px}
.letter-pill{aspect-ratio:1;border-radius:18px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:transform .15s;font-family:'Baloo 2',cursive;font-weight:800;font-size:clamp(22px,6vw,28px);color:white;position:relative;user-select:none;box-shadow:0 4px 14px rgba(0,0,0,.15)}
.letter-pill:active{transform:scale(.93)}
.letter-pill .pill-sub{font-size:11px;font-weight:700;opacity:.85;font-family:'Nunito',sans-serif;line-height:1}
.letter-pill.done::after{content:'⭐';position:absolute;top:-7px;right:-7px;font-size:16px;filter:drop-shadow(0 1px 3px rgba(0,0,0,.2))}
.quiz-global-btn-grid{display:block;margin:0 auto 8px;background:linear-gradient(135deg,var(--amber),#D85A30);color:white;border:none;border-radius:100px;padding:14px 32px;font-family:'Baloo 2',cursive;font-size:18px;font-weight:800;cursor:pointer;box-shadow:0 6px 18px rgba(186,117,23,.3);transition:transform .15s}
.quiz-global-btn-grid:active{transform:scale(.96)}

/* ===== ACTIVITY ===== */
.activity-top{background:var(--card);padding:12px 16px;display:flex;align-items:center;gap:12px;box-shadow:0 2px 12px rgba(0,0,0,.06);flex-shrink:0}
.act-badge{width:54px;height:54px;border-radius:16px;display:flex;align-items:center;justify-content:center;font-family:'Baloo 2',cursive;font-weight:800;font-size:32px;color:white;flex-shrink:0}
.act-info{flex:1}
.act-info h2{font-family:'Baloo 2',cursive;font-size:20px;font-weight:800;color:var(--text)}
.act-info p{font-size:13px;color:var(--muted);margin-top:2px}
.tab-bar{display:flex;background:var(--card);border-bottom:2px solid #F0E8EE;flex-shrink:0;overflow-x:auto}
.tab-btn{flex:1;min-width:70px;padding:10px 4px;border:none;background:none;font-family:'Nunito',sans-serif;font-size:clamp(10px,2.8vw,12px);font-weight:700;color:var(--muted);cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px;transition:color .15s,border-color .15s;line-height:1.3;white-space:nowrap}
.tab-btn.active{color:var(--pink);border-bottom-color:var(--pink)}
.activity-content{flex:1;overflow-y:auto;padding:20px 16px 32px;-webkit-overflow-scrolling:touch}

/* ---- Discover ---- */
.mnemonic-box{background:linear-gradient(135deg,#FFF5F0,#FFE8F2);border-radius:20px;padding:16px;margin-bottom:16px;display:flex;align-items:center;gap:14px;border:2px solid rgba(212,83,126,.15)}
.mnemonic-letter{font-family:'Baloo 2',cursive;font-size:52px;font-weight:800;line-height:1;flex-shrink:0}
.mnemonic-text{flex:1}
.mnemonic-text strong{font-size:15px;color:var(--text);display:block;margin-bottom:2px}
.mnemonic-text span{font-size:13px;color:var(--muted)}
.word-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;max-width:500px;margin:0 auto 14px}
.word-card{background:#FFF5F0;border:2.5px solid transparent;border-radius:18px;padding:12px 8px;text-align:center;cursor:pointer;transition:transform .12s,border-color .2s,background .2s}
.word-card:active{transform:scale(.95)}
.word-card .wemoji{font-size:36px;margin-bottom:5px;display:block}
.word-card .wname{font-size:14px;font-weight:900;color:var(--text)}
.word-card.correct{border-color:var(--green);background:var(--green-light)}
.word-card.correct .wname{color:var(--green-dark)}
.word-card.wrong{border-color:#D85A30;background:var(--red-light)}
.word-card.wrong .wname{color:var(--red-dark)}

/* ---- Trace ---- */
.trace-wrap{text-align:center}
.canvas-container{position:relative;display:inline-block;margin:0 auto}
canvas#trace-canvas{border-radius:18px;border:2px solid var(--border);cursor:crosshair;background:#FFF5F0;display:block;touch-action:none}
.trace-ghost{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-family:'Baloo 2',cursive;font-size:clamp(80px,25vw,130px);font-weight:800;opacity:.07;color:var(--text);pointer-events:none;user-select:none;line-height:1}
.trace-actions{display:flex;gap:10px;justify-content:center;margin-top:14px}

/* ---- Quiz letter ---- */
.quiz-prompt{font-family:'Baloo 2',cursive;font-size:18px;font-weight:700;color:var(--text);text-align:center;margin-bottom:8px}
.quiz-emoji-big{font-size:clamp(60px,18vw,86px);text-align:center;margin:4px 0;display:block}
.quiz-word-name{font-size:20px;font-weight:900;text-align:center;margin-bottom:14px;color:var(--text)}
.quiz-choices{display:grid;grid-template-columns:1fr 1fr;gap:10px;max-width:380px;margin:0 auto}
.quiz-choice{padding:16px;border-radius:16px;border:2.5px solid var(--border);background:#FFF5F0;cursor:pointer;font-family:'Baloo 2',cursive;font-size:clamp(20px,6vw,26px);font-weight:800;color:var(--text);text-align:center;transition:transform .12s,border-color .15s,background .15s;width:100%}
.quiz-choice:active{transform:scale(.94)}
.quiz-choice.correct{border-color:var(--green);background:var(--green-light);color:var(--green-dark)}
.quiz-choice.wrong{border-color:#D85A30;background:var(--red-light);color:var(--red-dark)}

/* ---- Validate ---- */
.validate-center{text-align:center}
.confetti-row{font-size:clamp(26px,8vw,38px);margin:10px 0;letter-spacing:4px}
.validate-msg{font-family:'Baloo 2',cursive;font-size:20px;font-weight:800;color:var(--text);margin:8px 0}
.validate-sub{font-size:14px;color:var(--muted);margin-bottom:20px}
.nav-btns{display:flex;gap:10px;justify-content:center;margin-top:16px;flex-wrap:wrap}

/* ===== BUTTONS ===== */
.btn-primary{background:linear-gradient(135deg,var(--coral),var(--pink));color:white;border:none;border-radius:100px;padding:14px 36px;font-family:'Baloo 2',cursive;font-size:18px;font-weight:800;cursor:pointer;box-shadow:0 6px 20px rgba(212,83,126,.3);transition:transform .15s;display:inline-block}
.btn-primary:active{transform:scale(.96)}
.btn-secondary{background:none;border:2px solid var(--border);border-radius:100px;padding:12px 24px;font-family:'Nunito',sans-serif;font-size:14px;font-weight:700;color:var(--muted);cursor:pointer}
.btn-secondary:active{border-color:var(--pink);color:var(--pink)}
.btn-earn{background:linear-gradient(135deg,var(--amber),#D85A30);color:white;border:none;border-radius:100px;padding:16px 40px;font-family:'Baloo 2',cursive;font-size:20px;font-weight:800;cursor:pointer;box-shadow:0 6px 20px rgba(186,117,23,.3);transition:transform .15s}
.btn-earn:active{transform:scale(.96)}
.feedback{text-align:center;font-size:15px;font-weight:700;color:var(--muted);min-height:22px;margin:8px 0}

/* ===== GLOBAL QUIZ ===== */
#screen-globalquiz{background:var(--bg)}
.gq-top{background:var(--card);padding:12px 16px;display:flex;align-items:center;gap:12px;box-shadow:0 2px 12px rgba(0,0,0,.06);flex-shrink:0}
.gq-pbar-wrap{background:#F0E8F0;border-radius:100px;height:8px;overflow:hidden;flex:1}
.gq-pbar-fill{height:100%;border-radius:100px;background:linear-gradient(90deg,var(--amber),#D85A30);transition:width .5s}
.gq-counter{font-size:13px;font-weight:700;color:var(--muted);flex-shrink:0;min-width:52px;text-align:right}
.gq-content{flex:1;overflow-y:auto;padding:20px 16px 32px;-webkit-overflow-scrolling:touch;display:flex;flex-direction:column;align-items:center}
.gq-type-badge{font-size:11px;font-weight:700;color:white;padding:4px 12px;border-radius:100px;margin-bottom:10px;text-transform:uppercase;letter-spacing:1px}
.gq-question{font-family:'Baloo 2',cursive;font-size:clamp(17px,5vw,22px);font-weight:700;color:var(--text);text-align:center;margin-bottom:12px;line-height:1.3}
.gq-big-letter{font-family:'Baloo 2',cursive;font-size:clamp(70px,20vw,110px);font-weight:800;text-align:center;line-height:1;margin:4px 0 12px;display:block}
.gq-emoji-big{font-size:clamp(56px,16vw,80px);text-align:center;margin:0 0 4px;display:block}
.gq-word-big{font-size:22px;font-weight:900;text-align:center;margin-bottom:14px;color:var(--text)}
.gq-choices{display:grid;gap:10px;max-width:420px;width:100%;margin:0 auto}
.gq-choices.cols2{grid-template-columns:1fr 1fr}
.gq-choices.cols3{grid-template-columns:1fr 1fr 1fr}
.gq-choices.cols4{grid-template-columns:1fr 1fr 1fr 1fr}
.gq-choice{padding:14px 8px;border-radius:16px;border:2.5px solid var(--border);background:#FFF5F0;cursor:pointer;font-family:'Baloo 2',cursive;font-size:clamp(18px,5vw,24px);font-weight:800;color:var(--text);text-align:center;transition:transform .12s,border-color .15s,background .15s;width:100%}
.gq-choice.sm{font-size:clamp(13px,3.5vw,16px);font-family:'Nunito',sans-serif;font-weight:900;padding:12px 6px;line-height:1.3}
.gq-choice.word-choice{font-size:clamp(13px,3.5vw,16px);font-family:'Nunito',sans-serif;font-weight:900;padding:12px 8px}
.gq-choice:active{transform:scale(.94)}
.gq-choice.correct{border-color:var(--green);background:var(--green-light);color:var(--green-dark)}
.gq-choice.wrong{border-color:#D85A30;background:var(--red-light);color:var(--red-dark)}
.gq-feedback{text-align:center;font-size:15px;font-weight:700;min-height:24px;margin:10px 0 4px;color:var(--muted);width:100%}
.gq-btn-next{display:block;margin:6px auto 0;background:linear-gradient(135deg,var(--amber),#D85A30);color:white;border:none;border-radius:100px;padding:14px 36px;font-family:'Baloo 2',cursive;font-size:18px;font-weight:800;cursor:pointer;box-shadow:0 6px 18px rgba(186,117,23,.28);transition:transform .15s,opacity .2s;opacity:0;pointer-events:none}
.gq-btn-next.visible{opacity:1;pointer-events:auto}
.gq-btn-next:active{transform:scale(.96)}

/* sequence quiz */
.sequence-display{display:flex;align-items:center;justify-content:center;gap:6px;flex-wrap:wrap;margin:10px 0 16px}
.seq-item{width:52px;height:52px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-family:'Baloo 2',cursive;font-size:24px;font-weight:800}
.seq-item.filled{background:#FFF5F0;border:2px solid var(--border);color:var(--text)}
.seq-item.blank{background:var(--pink);border:2px dashed var(--pink-dark);color:white;font-size:18px}

/* missing letter */
.missing-word-display{font-family:'Baloo 2',cursive;font-size:clamp(28px,8vw,42px);font-weight:800;text-align:center;margin:8px 0 16px;color:var(--text);letter-spacing:4px}
.missing-word-display .blank-slot{color:var(--pink);border-bottom:4px solid var(--pink);padding:0 4px;display:inline-block;min-width:32px}

/* match pairs */
.match-area{display:flex;gap:16px;justify-content:center;max-width:400px;width:100%;margin:0 auto}
.match-col{display:flex;flex-direction:column;gap:10px;flex:1}
.match-item{padding:14px 10px;border-radius:14px;border:2.5px solid var(--border);background:#FFF5F0;cursor:pointer;font-family:'Baloo 2',cursive;font-size:clamp(20px,6vw,28px);font-weight:800;color:var(--text);text-align:center;transition:border-color .15s,background .15s}
.match-item.selected{border-color:var(--pink);background:#FFE8F2}
.match-item.matched{border-color:var(--green);background:var(--green-light);color:var(--green-dark);cursor:default}
.match-item.error{border-color:#D85A30;background:var(--red-light)}
.match-col-label{font-size:12px;font-weight:700;color:var(--muted);text-align:center;margin-bottom:4px;text-transform:uppercase;letter-spacing:1px}

/* find in crowd */
.crowd-grid{display:grid;gap:8px;max-width:400px;width:100%;margin:0 auto}
.crowd-item{padding:14px;border-radius:14px;border:2.5px solid var(--border);background:#FFF5F0;cursor:pointer;font-family:'Baloo 2',cursive;font-size:clamp(20px,6vw,26px);font-weight:800;color:var(--text);text-align:center;transition:transform .1s,border-color .15s,background .15s}
.crowd-item:active{transform:scale(.95)}
.crowd-item.correct{border-color:var(--green);background:var(--green-light);color:var(--green-dark)}
.crowd-item.wrong{border-color:#D85A30;background:var(--red-light);color:var(--red-dark)}

/* ===== RESULTS ===== */
#screen-results{background:linear-gradient(160deg,#FFF0E8 0%,#FFE4EF 50%,#E8F8F2 100%);align-items:center;justify-content:center;padding:24px 20px}
.results-emoji{font-size:clamp(60px,16vw,90px);text-align:center;margin-bottom:8px;display:block;animation:bounce .6s ease-in-out}
@keyframes bounce{0%,100%{transform:scale(1)}50%{transform:scale(1.15)}}
.results-title{font-family:'Baloo 2',cursive;font-size:clamp(26px,7vw,42px);font-weight:800;text-align:center;color:var(--text);margin-bottom:6px}
.results-sub{font-size:clamp(13px,4vw,17px);color:var(--muted);text-align:center;margin-bottom:24px}
.results-score-card{background:var(--card);border-radius:28px;padding:22px 32px;text-align:center;box-shadow:var(--shadow);margin-bottom:20px;width:100%;max-width:320px}
.results-score{font-family:'Baloo 2',cursive;font-size:clamp(48px,14vw,72px);font-weight:800;background:linear-gradient(135deg,var(--amber),#D85A30);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1}
.results-score-label{font-size:14px;font-weight:700;color:var(--muted);margin-top:4px}
.results-stars{font-size:clamp(22px,7vw,34px);margin-top:10px;letter-spacing:3px;min-height:40px}
.results-msg{font-family:'Baloo 2',cursive;font-size:clamp(15px,4.5vw,20px);font-weight:800;color:var(--text);margin-bottom:20px;text-align:center}
.results-btns{display:flex;gap:12px;flex-wrap:wrap;justify-content:center}

.badge{padding:5px 14px;border-radius:100px;font-size:12px;font-weight:700}
.badge-green{background:var(--green-light);color:var(--green-dark)}
.badge-pink{background:#FFE8F2;color:var(--pink-dark)}
.badge-amber{background:var(--amber-light);color:var(--amber-dark)}
.badge-row{display:flex;gap:8px;justify-content:center;margin-top:12px;flex-wrap:wrap}
</style>
</head>
<body>

<!-- HOME -->
<div class="screen active" id="screen-home">
  <span class="home-deco">🔤</span><span class="home-deco">⭐</span>
  <span class="home-deco">🎨</span><span class="home-deco">🏆</span>
  <div class="home-logo">ABC</div>
  <div class="home-title">Mon Cahier des Lettres</div>
  <div class="home-sub">Apprends l'alphabet en jouant !</div>
  <div class="progress-card">
    <div class="progress-label" id="home-label">Lettres apprises : 0 / 26</div>
    <div class="pbar-wrap"><div class="pbar-fill" id="home-pbar" style="width:0%"></div></div>
    <div class="pbar-stars" id="home-stars"></div>
  </div>
  <div class="home-btns">
    <button class="btn-start" onclick="showGrid()">📚 Apprendre les lettres</button>
    <button class="btn-quiz-home" onclick="startGlobalQuiz()">🏆 Grand Quiz — toutes les lettres !</button>
    <button class="btn-reset" onclick="resetProgress()">🗑 Recommencer à zéro</button>
  </div>
</div>

<!-- GRID -->
<div class="screen" id="screen-grid">
  <div class="top-bar">
    <button class="btn-back" onclick="showHome()">←</button>
    <div class="top-bar-title">Choisis une lettre</div>
    <div class="top-bar-badge" id="grid-badge">0 / 26 ⭐</div>
  </div>
  <div class="grid-scroll">
    <div class="alphabet-grid" id="alphabet-grid"></div>
    <button class="quiz-global-btn-grid" onclick="startGlobalQuiz()">🏆 Grand Quiz !</button>
  </div>
</div>

<!-- ACTIVITY -->
<div class="screen" id="screen-activity">
  <div class="activity-top">
    <button class="btn-back" onclick="showGrid()">←</button>
    <div class="act-badge" id="act-badge">A</div>
    <div class="act-info">
      <h2 id="act-title">Lettre A</h2>
      <p id="act-sub">Son : "a"</p>
    </div>
  </div>
  <div class="tab-bar">
    <button class="tab-btn active" onclick="switchTab(0)">🔍 Découvre</button>
    <button class="tab-btn" onclick="switchTab(1)">✏️ Trace</button>

const ABC = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');

// ============================================================
// STATE
// ============================================================
let discovered = new Set();
let currentIdx = 0;
let currentTab = 0;
let quizAnswered = false;
let traceCanvas, traceCtx, isDrawing = false;

let gqQuestions = [], gqCurrent = 0, gqScore = 0, gqAnswered = false;
let matchSelected = null;

function loadProgress(){ try{ const s=localStorage.getItem('abc_v3'); if(s) discovered=new Set(JSON.parse(s)); }catch(e){} }
function saveProgress(){ try{ localStorage.setItem('abc_v3',JSON.stringify([...discovered])); }catch(e){} }
function resetProgress(){ if(!confirm('Effacer tout le progrès ?')) return; discovered=new Set(); saveProgress(); updateHome(); buildGrid(); }

// ============================================================
// SCREENS
// ============================================================
function showScreen(id){ document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active')); document.getElementById('screen-'+id).classList.add('active'); }
function showHome(){ updateHome(); showScreen('home'); }
function showGrid(){ buildGrid(); showScreen('grid'); }

function updateHome(){
  const n=discovered.size;
  document.getElementById('home-label').textContent=`Lettres apprises : ${n} / 26`;
  document.getElementById('home-pbar').style.width=(n/26*100)+'%';
  let stars=''; for(let i=0;i<Math.min(n,10);i++) stars+='⭐';
  document.getElementById('home-stars').textContent=stars;
}

function buildGrid(){
  const grid=document.getElementById('alphabet-grid'); grid.innerHTML='';
  LETTERS.forEach((d,i)=>{
    const pill=document.createElement('div');
    pill.className='letter-pill'+(discovered.has(i)?' done':'');
    pill.style.background=d.color;
    pill.innerHTML=`${d.l}<span class="pill-sub">${d.l.toLowerCase()}</span>`;
    pill.onclick=()=>openLetter(i);
    grid.appendChild(pill);
  });
  document.getElementById('grid-badge').textContent=`${discovered.size} / 26 ⭐`;
}

function openLetter(i){
  currentIdx=i; currentTab=0;
  const d=LETTERS[i];
  const badge=document.getElementById('act-badge');
  badge.textContent=d.l; badge.style.background=d.color;
  document.getElementById('act-title').textContent=`Lettre ${d.l}`;
  document.getElementById('act-sub').textContent=`Son : "${d.sound}"`;
  showScreen('activity'); switchTab(0);
}

// ============================================================
// TABS
// ============================================================
function switchTab(idx){
  currentTab=idx;
  document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active',i===idx));
  const body=document.getElementById('activity-content');
  if(idx===0) renderDiscover(body);
  else if(idx===1) renderTrace(body);
  else if(idx===2) renderQuizLetter(body);
  else renderValidate(body);
}

// ---- DISCOVER ----
function renderDiscover(body){
  const d=LETTERS[currentIdx];
  // All 6 words are correct (they all start with d.l), show all, explain first letter
  body.innerHTML=`
    <div class="mnemonic-box">
      <div class="mnemonic-letter" style="color:${d.color}">${d.l}<br><span style="font-size:28px;opacity:.6">${d.l.toLowerCase()}</span></div>
      <div class="mnemonic-text">
        <strong>${d.mnemonic}</strong>
        <span>Son : <b>"${d.sound}"</b> — tous ces mots commencent par <b style="color:${d.color}">${d.l}</b> !</span>
      </div>
    </div>
    <div class="word-grid" id="word-grid"></div>
    <div class="feedback" id="disc-fb">👆 Touche chaque mot pour l'entendre !</div>
    <button class="btn-primary" style="display:block;margin:12px auto 0" onclick="switchTab(1)">Suivant → ✏️</button>
  `;
  const grid=document.getElementById('word-grid');
  d.words.forEach(w=>{
    const card=document.createElement('div');
    card.className='word-card';
    card.innerHTML=`<span class="wemoji">${w.e}</span><div class="wname"><b style="color:${d.color}">${d.l}</b>${w.n.slice(1).toLowerCase()}</div>`;
    card.onclick=()=>{ document.getElementById('disc-fb').textContent=`${w.e}  "${w.n}" commence par ${d.l} !`; };
    grid.appendChild(card);
  });
}

// ---- TRACE ----
function renderTrace(body){
  const d=LETTERS[currentIdx];
  const cw=Math.min(window.innerWidth-48,340);
  const ch=Math.round(cw*0.62);
  body.innerHTML=`
    <div class="trace-wrap">
      <p style="font-size:15px;color:var(--muted);margin-bottom:12px;text-align:center">Dessine <strong style="color:${d.color}">${d.l}</strong> et <strong style="color:${d.color}">${d.l.toLowerCase()}</strong> en suivant le modèle fantôme !</p>
      <div class="canvas-container">
        <canvas id="trace-canvas" width="${cw}" height="${ch}" style="width:${cw}px;height:${ch}px"></canvas>
        <div class="trace-ghost">${d.l} ${d.l.toLowerCase()}</div>
      </div>
      <div class="trace-actions">
        <button class="btn-secondary" onclick="clearTrace()">🗑 Effacer</button>
        <button class="btn-primary" onclick="switchTab(2)">Suivant → 🎯</button>
      </div>
    </div>
  `;
  traceCanvas=document.getElementById('trace-canvas');
  traceCtx=traceCanvas.getContext('2d');
  traceCtx.strokeStyle=d.color; traceCtx.lineWidth=7; traceCtx.lineCap='round'; traceCtx.lineJoin='round';
  function pos(e){ const r=traceCanvas.getBoundingClientRect(),sx=traceCanvas.width/r.width,sy=traceCanvas.height/r.height,src=e.touches?e.touches[0]:e; return{x:(src.clientX-r.left)*sx,y:(src.clientY-r.top)*sy}; }
  traceCanvas.addEventListener('mousedown',e=>{isDrawing=true;const p=pos(e);traceCtx.beginPath();traceCtx.moveTo(p.x,p.y)});
  traceCanvas.addEventListener('mousemove',e=>{if(!isDrawing)return;const p=pos(e);traceCtx.lineTo(p.x,p.y);traceCtx.stroke()});
  traceCanvas.addEventListener('mouseup',()=>isDrawing=false);
  traceCanvas.addEventListener('mouseleave',()=>isDrawing=false);
  traceCanvas.addEventListener('touchstart',e=>{e.preventDefault();isDrawing=true;const p=pos(e);traceCtx.beginPath();traceCtx.moveTo(p.x,p.y)},{passive:false});
  traceCanvas.addEventListener('touchmove',e=>{e.preventDefault();if(!isDrawing)return;const p=pos(e);traceCtx.lineTo(p.x,p.y);traceCtx.stroke()},{passive:false});
  traceCanvas.addEventListener('touchend',()=>isDrawing=false);
}
function clearTrace(){ if(traceCtx) traceCtx.clearRect(0,0,traceCanvas.width,traceCanvas.height); }

// ---- QUIZ LETTER (find letter from word) ----
function renderQuizLetter(body){
  const d=LETTERS[currentIdx]; quizAnswered=false;
  const wrongs=LETTERS.filter((_,i)=>i!==currentIdx).sort(()=>Math.random()-.5).slice(0,3);
  const choices=[...wrongs.map(x=>x.l),d.l].sort(()=>Math.random()-.5);
  const word=d.words[Math.floor(Math.random()*d.words.length)];
  body.innerHTML=`
    <p class="quiz-prompt">Par quelle lettre commence ce mot ?</p>
    <span class="quiz-emoji-big">${word.e}</span>
    <div class="quiz-word-name">${word.n}</div>
    <div class="quiz-choices" id="lq-choices"></div>
    <div class="feedback" id="lq-fb"></div>
    <button class="btn-primary" style="display:block;margin:12px auto 0;opacity:0;pointer-events:none" id="lq-next" onclick="switchTab(3)">Suivant → ⭐</button>
  `;
  const el=document.getElementById('lq-choices');
  choices.forEach(ch=>{
    const btn=document.createElement('button'); btn.className='quiz-choice'; btn.textContent=ch;
    btn.onclick=()=>{
      if(quizAnswered) return; quizAnswered=true;
      el.querySelectorAll('.quiz-choice').forEach(b=>{ if(b.textContent===d.l) b.classList.add('correct'); else if(b===btn&&b.textContent!==d.l) b.classList.add('wrong'); });
      document.getElementById('lq-fb').textContent=ch===d.l?'🎉 Bravo ! C\'est bien '+d.l+' !':'🤔 C\'est la lettre '+d.l+' !';
      const nxt=document.getElementById('lq-next'); nxt.style.opacity='1'; nxt.style.pointerEvents='auto';
    };
    el.appendChild(btn);
  });
}

// ---- VALIDATE ----
function renderValidate(body){
  const d=LETTERS[currentIdx]; const isDone=discovered.has(currentIdx);
  if(isDone){
    body.innerHTML=`<div class="validate-center">
      <div class="confetti-row">🎉⭐🎊⭐🎉</div>
      <p class="validate-msg">Tu connais déjà la lettre ${d.l} !</p>
      <p class="validate-sub">Continue avec une autre lettre !</p>
      <div class="nav-btns">
        ${currentIdx>0?`<button class="btn-secondary" onclick="openLetter(${currentIdx-1})">← ${LETTERS[currentIdx-1].l}</button>`:''}
        ${currentIdx<25?`<button class="btn-primary" onclick="openLetter(${currentIdx+1})">${LETTERS[currentIdx+1].l} →</button>`:''}
      </div></div>`;
  } else {
    body.innerHTML=`<div class="validate-center">
      <p class="validate-msg">Tu as découvert, tracé et deviné la lettre <span style="color:${d.color};font-size:24px">${d.l}</span> !</p>

      <button class="btn-earn" onclick="earnStar()">⭐ Gagner mon étoile !</button></div>`;
  }
}
function earnStar(){
  const d=LETTERS[currentIdx]; discovered.add(currentIdx); saveProgress(); buildGrid(); updateHome();
  document.getElementById('activity-content').innerHTML=`<div class="validate-center">
    <div class="confetti-row" style="font-size:40px">🎉⭐🎊</div>
    <p class="validate-msg" style="font-size:22px">Bravo ! Tu connais la lettre ${d.l} !</p>
    <div class="badge-row"><span class="badge badge-green">⭐ Étoile gagnée !</span><span class="badge badge-pink">${discovered.size} / 26 lettres</span></div>
    <div class="nav-btns" style="margin-top:20px">
      ${currentIdx<25?`<button class="btn-primary" onclick="openLetter(${currentIdx+1})">Lettre suivante : ${LETTERS[currentIdx+1].l} →</button>`:'<p style="font-family:\'Baloo 2\',cursive;font-size:20px;font-weight:800;color:var(--green)">🏆 Tu as appris tout l\'alphabet !</p>'}
    </div></div>`;
}

// ============================================================
// GLOBAL QUIZ — 6 question types
// ============================================================
function buildGlobalQuestions(){
  const qs=[];
  // Type 1: find letter from emoji/word (all 26 letters)
  LETTERS.forEach((d,i)=>{
    const word=d.words[Math.floor(Math.random()*d.words.length)];
    const wrongs=LETTERS.filter((_,j)=>j!==i).sort(()=>Math.random()-.5).slice(0,3).map(x=>x.l);
    qs.push({type:'find-letter',letter:d.l,color:d.color,emoji:word.e,word:word.n,choices:[...wrongs,d.l].sort(()=>Math.random()-.5)});
  });
  // Type 2: find word starting with letter (10 questions)
  LETTERS.sort(()=>Math.random()-.5).slice(0,10).forEach((d,i)=>{
    const correct=d.words[Math.floor(Math.random()*d.words.length)];
    const wrongs=LETTERS.filter(x=>x.l!==d.l).sort(()=>Math.random()-.5).slice(0,3).map(x=>x.words[Math.floor(Math.random()*x.words.length)]);
    qs.push({type:'find-word',letter:d.l,color:d.color,correct,choices:[...wrongs,correct].sort(()=>Math.random()-.5)});
  });
  // Type 3: complete sequence (10 questions)
  for(let k=0;k<10;k++){
    const start=Math.floor(Math.random()*23);
    const seq=ABC.slice(start,start+5);
    const blankIdx=1+Math.floor(Math.random()*3);
    const answer=seq[blankIdx];
    const wrongLetters=ABC.filter(l=>!seq.includes(l)).sort(()=>Math.random()-.5).slice(0,3);
    qs.push({type:'sequence',seq,blankIdx,answer,choices:[...wrongLetters,answer].sort(()=>Math.random()-.5)});
  }
  // Type 4: missing first letter of word (10 questions)
  LETTERS.sort(()=>Math.random()-.5).slice(0,10).forEach(d=>{
    const word=d.words[Math.floor(Math.random()*d.words.length)];
    const wrongs=LETTERS.filter(x=>x.l!==d.l).sort(()=>Math.random()-.5).slice(0,5).map(x=>x.l);
    const choices=[...wrongs.slice(0,5),d.l].sort(()=>Math.random()-.5);
    qs.push({type:'missing-letter',letter:d.l,color:d.color,emoji:word.e,word:word.n,choices});
  });
  // Type 5: match maj/min (8 rounds of 4 pairs)
  for(let k=0;k<8;k++){
    const picked=LETTERS.sort(()=>Math.random()-.5).slice(0,4);
    qs.push({type:'match-case',pairs:picked});
  }
  // Type 6: find letter in a crowd (10 questions)
  LETTERS.sort(()=>Math.random()-.5).slice(0,10).forEach(d=>{
    const distractors=ABC.filter(l=>l!==d.l).sort(()=>Math.random()-.5).slice(0,7);
    const crowd=[...distractors,d.l,d.l.toLowerCase(),...distractors.slice(0,2).map(l=>l.toLowerCase())].sort(()=>Math.random()-.5);
    qs.push({type:'find-in-crowd',letter:d.l,color:d.color,crowd});
  });

  return qs.sort(()=>Math.random()-.5).slice(0,30);
}

function startGlobalQuiz(){
  gqQuestions=buildGlobalQuestions(); gqCurrent=0; gqScore=0; gqAnswered=false;
  showScreen('globalquiz'); renderGQQuestion();
}

function renderGQQuestion(){
  const q=gqQuestions[gqCurrent]; gqAnswered=false;
  document.getElementById('gq-counter').textContent=`${gqCurrent+1} / ${gqQuestions.length}`;
  document.getElementById('gq-pbar').style.width=(gqCurrent/gqQuestions.length*100)+'%';
  const body=document.getElementById('gq-content'); body.innerHTML='';

  const typeLabels={'find-letter':['🎯 Trouve la lettre','#D4537E'],'find-word':['📖 Trouve le mot','#185FA5'],'sequence':['🔢 Complète la suite','#1D9E75'],'missing-letter':['✏️ Lettre manquante','#D85A30'],'match-case':['🔗 Relie majuscule et minuscule','#534AB7'],'find-in-crowd':['🔍 Trouve la lettre cachée','#BA7517']};
  const [typeLabel,typeColor]=typeLabels[q.type]||['','#888'];
  const badge=el('div',{class:'gq-type-badge',style:`background:${typeColor}`},typeLabel); body.appendChild(badge);

  if(q.type==='find-letter') renderGQ_findLetter(body,q);
  else if(q.type==='find-word') renderGQ_findWord(body,q);
  else if(q.type==='sequence') renderGQ_sequence(body,q);
  else if(q.type==='missing-letter') renderGQ_missingLetter(body,q);
  else if(q.type==='match-case') renderGQ_matchCase(body,q);
  else if(q.type==='find-in-crowd') renderGQ_findInCrowd(body,q);

  const fb=el('div',{class:'gq-feedback',id:'gq-fb'},''); body.appendChild(fb);
  const nxt=el('button',{class:'gq-btn-next',id:'gq-next',onclick:'nextGQQuestion()'},'Question suivante →'); body.appendChild(nxt);
}

function el(tag,attrs={},inner=''){
  const e=document.createElement(tag);
  Object.entries(attrs).forEach(([k,v])=>{ if(k==='onclick') e.onclick=new Function(v); else if(k==='class') e.className=v; else e.setAttribute(k,v); });
  if(typeof inner==='string') e.innerHTML=inner; else if(inner instanceof HTMLElement) e.appendChild(inner);
  return e;
}

function showFeedback(correct,msg){ document.getElementById('gq-fb').textContent=msg||( correct?['🎉 Bravo !','⭐ Super !','✅ Parfait !','🌟 Excellent !'][Math.floor(Math.random()*4)]:'🤔 Presque ! Continue !'); if(correct) gqScore++; const nxt=document.getElementById('gq-next'); nxt.classList.add('visible'); }

// --- Type 1: find letter ---
function renderGQ_findLetter(body,q){
  body.appendChild(el('div',{class:'gq-question'},`Par quelle lettre commence ce mot ?`));
  body.appendChild(el('span',{class:'gq-emoji-big'},q.emoji));
  body.appendChild(el('div',{class:'gq-word-big'},q.word));
  const grid=el('div',{class:'gq-choices cols2'},''); body.appendChild(grid);
  q.choices.forEach(ch=>{
    const btn=el('button',{class:'gq-choice'},ch);
    btn.onclick=()=>{ if(gqAnswered)return; gqAnswered=true; grid.querySelectorAll('.gq-choice').forEach(b=>{ if(b.textContent===q.letter)b.classList.add('correct'); else if(b===btn&&b.textContent!==q.letter)b.classList.add('wrong'); }); showFeedback(ch===q.letter); };
    grid.appendChild(btn);
  });
}

// --- Type 2: find word ---
function renderGQ_findWord(body,q){
  body.appendChild(el('div',{class:'gq-question'},'Quel mot commence par cette lettre ?'));
  body.appendChild(el('span',{class:'gq-big-letter',style:`color:${q.color}`},q.letter));
  const grid=el('div',{class:'gq-choices cols2'},''); body.appendChild(grid);
  q.choices.forEach(w=>{
    const btn=document.createElement('button'); btn.className='gq-choice word-choice';
    btn.innerHTML=`${w.e}<br>${w.n}`; btn._key=w.n;
    btn.onclick=()=>{ if(gqAnswered)return; gqAnswered=true; grid.querySelectorAll('.gq-choice').forEach(b=>{ if(b._key===q.correct.n)b.classList.add('correct'); else if(b===btn&&b._key!==q.correct.n)b.classList.add('wrong'); }); showFeedback(w.n===q.correct.n); };
    grid.appendChild(btn);
  });
}

// --- Type 3: sequence ---
function renderGQ_sequence(body,q){
  body.appendChild(el('div',{class:'gq-question'},'Quelle lettre manque dans la suite ?'));
  const seqDiv=el('div',{class:'sequence-display'},''); body.appendChild(seqDiv);
  q.seq.forEach((l,i)=>{
    if(i===q.blankIdx){ seqDiv.appendChild(el('div',{class:'seq-item blank'},'?')); }
    else { const s=el('div',{class:'seq-item filled'},l); seqDiv.appendChild(s); }
    if(i<q.seq.length-1) seqDiv.appendChild(el('span',{style:'font-size:20px;font-weight:700;color:var(--muted)'},'→'));
  });
  const grid=el('div',{class:'gq-choices cols4'},''); body.appendChild(grid);
  q.choices.forEach(ch=>{
    const btn=el('button',{class:'gq-choice'},ch);
    btn.onclick=()=>{ if(gqAnswered)return; gqAnswered=true; grid.querySelectorAll('.gq-choice').forEach(b=>{ if(b.textContent===q.answer)b.classList.add('correct'); else if(b===btn&&b.textContent!==q.answer)b.classList.add('wrong'); }); showFeedback(ch===q.answer,ch===q.answer?`🎉 Oui ! ${q.seq.join(' → ')}`:`🤔 C'était "${q.answer}" !`); };
    grid.appendChild(btn);
  });
}

// --- Type 4: missing first letter ---
function renderGQ_missingLetter(body,q){
  body.appendChild(el('div',{class:'gq-question'},'Quelle lettre manque au début de ce mot ?'));
  body.appendChild(el('span',{class:'gq-emoji-big'},q.emoji));
  const wordDiv=el('div',{class:'missing-word-display'},''); 
  wordDiv.innerHTML=`<span class="blank-slot">?</span>${q.word.slice(1).toLowerCase()}`;
  body.appendChild(wordDiv);
  const grid=el('div',{class:'gq-choices cols3'},''); body.appendChild(grid);
  q.choices.forEach(ch=>{
    const btn=el('button',{class:'gq-choice sm'},ch);
    btn.onclick=()=>{ if(gqAnswered)return; gqAnswered=true; grid.querySelectorAll('.gq-choice').forEach(b=>{ if(b.textContent===q.letter)b.classList.add('correct'); else if(b===btn&&b.textContent!==q.letter)b.classList.add('wrong'); }); showFeedback(ch===q.letter,ch===q.letter?`🎉 Bravo ! ${q.letter}${q.word.slice(1).toLowerCase()} = ${q.word} !`:`🤔 C'est ${q.letter} → ${q.word} !`); };
    grid.appendChild(btn);
  });
}

// --- Type 5: match maj/min ---
function renderGQ_matchCase(body,q){
  body.appendChild(el('div',{class:'gq-question'},'Relie chaque GRANDE lettre à sa petite lettre !'));
  const area=el('div',{class:'match-area'},'');
  const colLeft=el('div',{class:'match-col'},'');
  const colRight=el('div',{class:'match-col'},'');
  const lLabel=el('div',{class:'match-col-label'},'Majuscules'); const rLabel=el('div',{class:'match-col-label'},'minuscules');
  colLeft.appendChild(lLabel); colRight.appendChild(rLabel);
  body.appendChild(area); area.appendChild(colLeft); area.appendChild(colRight);

  const shuffledMaj=q.pairs.map(p=>p.l).sort(()=>Math.random()-.5);
  const shuffledMin=q.pairs.map(p=>p.l.toLowerCase()).sort(()=>Math.random()-.5);
  let matched=0; let selMaj=null;

  shuffledMaj.forEach(ch=>{
    const item=document.createElement('div'); item.className='match-item'; item.textContent=ch; item._val=ch;
    item.onclick=()=>{
      if(item.classList.contains('matched')) return;
      if(selMaj) selMaj.classList.remove('selected');
      selMaj=item; item.classList.add('selected');
    };
    colLeft.appendChild(item);
  });

  shuffledMin.forEach(ch=>{
    const item=document.createElement('div'); item.className='match-item'; item.textContent=ch; item._val=ch;
    item.onclick=()=>{
      if(item.classList.contains('matched')) return;
      if(!selMaj){ document.getElementById('gq-fb').textContent='👆 Choisis d\'abord une grande lettre !'; return; }
      const isMatch=selMaj._val===ch.toUpperCase();
      if(isMatch){
        selMaj.classList.remove('selected'); selMaj.classList.add('matched'); item.classList.add('matched');
        matched++; selMaj=null;
        if(matched===q.pairs.length){ gqScore++; document.getElementById('gq-fb').textContent='🎉 Parfait ! Toutes les paires trouvées !'; document.getElementById('gq-next').classList.add('visible'); }
        else document.getElementById('gq-fb').textContent=`✅ Bien ! Encore ${q.pairs.length-matched} paire(s) !`;
      } else {
        item.classList.add('error'); selMaj.classList.add('error');
        setTimeout(()=>{ item.classList.remove('error'); if(selMaj) selMaj.classList.remove('error','selected'); selMaj=null; },700);
        document.getElementById('gq-fb').textContent='🤔 Pas tout à fait, réessaie !';
      }
    };
    colRight.appendChild(item);
  });
}

// --- Type 6: find in crowd ---
function renderGQ_findInCrowd(body,q){
  body.appendChild(el('div',{class:'gq-question'},`Clique sur toutes les lettres <span style="color:${q.color};font-size:1.2em;font-weight:900">${q.letter}</span> et <span style="color:${q.color};font-size:1.2em;font-weight:900">${q.letter.toLowerCase()}</span> !`));
  const grid=el('div',{class:'crowd-grid',style:'grid-template-columns:repeat(4,1fr)'},''); body.appendChild(grid);
  const targets=q.crowd.filter(l=>l===q.letter||l===q.letter.toLowerCase());
  let found=0;
  q.crowd.forEach(ch=>{
    const isTarget=ch===q.letter||ch===q.letter.toLowerCase();
    const item=document.createElement('div'); item.className='crowd-item'; item.textContent=ch;
    item.onclick=()=>{
      if(item.classList.contains('correct')||item.classList.contains('wrong')) return;
      if(isTarget){ item.classList.add('correct'); found++; if(found>=targets.length){ gqScore++; document.getElementById('gq-fb').textContent='🎉 Bravo ! Tu as tout trouvé !'; document.getElementById('gq-next').classList.add('visible'); gqAnswered=true; } else document.getElementById('gq-fb').textContent=`✅ Bien ! Encore ${targets.length-found} à trouver !`; }
      else { item.classList.add('wrong'); document.getElementById('gq-fb').textContent=`🤔 ${ch} ≠ ${q.letter} — cherche encore !`; setTimeout(()=>item.classList.remove('wrong'),600); }
    };
    grid.appendChild(item);
  });
}

function nextGQQuestion(){ gqCurrent++; if(gqCurrent>=gqQuestions.length){ showResults(); return; } renderGQQuestion(); }

function showResults(){
  const total=gqQuestions.length; const pct=Math.round(gqScore/total*100);
  let emoji='🏆',msg,stars;
  if(pct===100){emoji='🏆';msg='PARFAIT ! Tu es un champion de l\'alphabet !';stars='⭐⭐⭐';}
  else if(pct>=80){emoji='🌟';msg='Excellent ! Continue comme ça !';stars='⭐⭐';}
  else if(pct>=60){emoji='😊';msg='Bien joué ! Encore un peu d\'entraînement !';stars='⭐';}
  else{emoji='💪';msg='Continue à t\'entraîner, tu vas y arriver !';stars='';}
  document.getElementById('res-emoji').textContent=emoji;
  document.getElementById('res-title').textContent=pct===100?'PARFAIT ! 🎊':'Terminé !';
  document.getElementById('res-sub').textContent=`${gqScore} bonnes réponses sur ${total} questions !`;
  document.getElementById('res-score').textContent=`${gqScore}/${total}`;
  document.getElementById('res-stars').textContent=stars;
  document.getElementById('res-msg').textContent=msg;
  showScreen('results');
}

loadProgress(); updateHome();
